name: Deploy Skinalyze to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REMOTE_DIR: /srv/saas/skinalyze

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Validate SSH secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST:-}" ]; then
            echo "Missing required secret: VPS_HOST"
            exit 1
          fi
          if [ -z "${VPS_USER:-}" ]; then
            echo "Missing required secret: VPS_USER"
            exit 1
          fi

      - name: Prepare known_hosts file
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -euo pipefail
          SSH_OPTS="-p ${VPS_PORT:-22} -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          ssh $SSH_OPTS "$VPS_USER@$VPS_HOST" << 'EOF'
          set -euo pipefail
          cd /srv/saas/skinalyze || exit 1
          git fetch --all --prune
          git reset --hard origin/main
          npm ci
          rm -rf .next
          npm run build
          if pm2 describe skinalyze > /dev/null 2>&1; then
            pm2 reload skinalyze --update-env
          else
            pm2 start ecosystem.config.js
          fi
          EOF