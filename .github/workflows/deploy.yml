name: Deploy Skinalyze to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REMOTE_DIR: /srv/saas/skinalyze

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh -o StrictHostKeyChecking=yes ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
          set -euo pipefail
          cd /srv/saas/skinalyze || exit 1
          git fetch --all --prune
          git reset --hard origin/main
          npm ci
          rm -rf .next
          npm run build
          if pm2 describe skinalyze > /dev/null 2>&1; then
            pm2 reload skinalyze --update-env
          else
            pm2 start ecosystem.config.js
          fi
          EOF